<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMZ Tools Secure Connect</title>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;color:#07112a;overflow:hidden}
    body{display:flex;align-items:center;justify-content:center;background:
      radial-gradient(circle at 14% 22%,rgba(255,255,255,.72) 0 58px,transparent 60px),
      radial-gradient(circle at 20% 20%,rgba(255,255,255,.72) 0 48px,transparent 50px),
      radial-gradient(circle at 76% 24%,rgba(255,255,255,.55) 0 92px,transparent 94px),
      radial-gradient(circle at 88% 43%,rgba(255,255,255,.64) 0 76px,transparent 78px),
      radial-gradient(circle at 9% 58%,rgba(255,255,255,.62) 0 95px,transparent 97px),
      radial-gradient(circle at 50% 78%,rgba(255,255,255,.45) 0 86px,transparent 88px),
      linear-gradient(135deg,#dff4f2 0%,#eaf7f3 45%,#eefaf7 100%);}
    .card{width:min(620px,calc(100vw - 32px));border-radius:24px;background:rgba(184,245,220,.68);border:1px solid rgba(255,255,255,.62);box-shadow:0 22px 60px rgba(15,23,42,.15);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);text-align:center;padding:42px 34px 34px;animation:fadeIn .35s ease-out both}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .loader-container{position:relative;width:86px;height:86px;margin:0 auto 24px}
    .circle{position:absolute;border:5px solid transparent;border-radius:999px;inset:0;animation:spin 1.2s linear infinite;border-top-color:#0ea5e9}
    .circle-2{inset:12px;border-top-color:#10b981;animation-duration:1.65s;animation-direction:reverse}.circle-3{inset:24px;border-top-color:#f59e0b;animation-duration:2.2s}
    @keyframes spin{to{transform:rotate(360deg)}}
    h2{font-size:34px;line-height:1.2;margin:0 0 18px;font-weight:900;letter-spacing:-.7px;color:#07112a}
    p{margin:0;color:#24415b;font-size:17px;font-weight:700;line-height:1.55}
    #tool-name,.extension-pill{display:inline-block;margin-top:12px;padding:13px 24px;border-radius:999px;background:rgba(220,255,233,.78);border:1px solid rgba(255,255,255,.7);box-shadow:0 8px 18px rgba(15,23,42,.06);font-size:20px;font-weight:900;color:#063b25;text-transform:capitalize;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.extension-pill{margin-left:6px;margin-right:6px}
    .footer{margin-top:28px;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#3f667a;font-weight:900;opacity:.7}
    .soft-note{display:none;margin-top:18px;color:#486275;font-size:13px;font-weight:750}
    body.stz-timeout .soft-note{display:block}
  </style>
</head>
<body>
  <div class="card">
    <div class="loader-container" id="spinner"><div class="circle circle-1"></div><div class="circle circle-2"></div><div class="circle circle-3"></div></div>
    <h2 id="status">Extension Checking</h2>
    <p id="sub-text">Please wait while we verify your extensions<br><span class="extension-pill">Extension 1</span><span class="extension-pill">Extension 2</span></p>
    <div class="soft-note" id="soft-note">Still preparing secure session...</div>
    <div class="footer">AMZ Tools Protection</div>
  </div>
  <script src="loading.js"></script>
</body>
</html>
